# .github/workflows/publish-modules.yml
# Publishes changed PowerShell modules to the PowerShell Gallery.
# Triggers on every push to main. Detects changed modules automatically.
# Version: 1.0.0

name: Publish PowerShell Modules

on:
  push:
    branches:
      - main                        # Only publish from main — never from feature branches
    paths:
      - 'modules/**'                # Only run if something inside modules/ changed

jobs:
  publish:
    name: Detect and Publish Changed Modules
    runs-on: windows-latest         # Must be Windows — Publish-Module works best here

    steps:

      # -----------------------------------------------------------------------
      # STEP 1: Check out the full git history so we can diff against HEAD~1
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2            # Need HEAD and HEAD~1 to detect what changed

      # -----------------------------------------------------------------------
      # STEP 2: Install PowerShellGet v2 and NuGet provider
      # The default runner has an older version — ensure we have what we need
      # -----------------------------------------------------------------------
      - name: Bootstrap PowerShellGet and NuGet provider
        shell: pwsh
        run: |
          # Trust the PSGallery repo so installs are non-interactive
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Ensure NuGet provider is present (required by PowerShellGet)
          if (-not (Get-PackageProvider -Name NuGet -ListAvailable -ErrorAction SilentlyContinue)) {
              Write-Host "Installing NuGet provider..."
              Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          }

          # Install or update PowerShellGet to the latest v2 release
          $pgInstalled = Get-Module -ListAvailable -Name PowerShellGet |
                          Sort-Object Version -Descending |
                          Select-Object -First 1
          if (-not $pgInstalled -or $pgInstalled.Version -lt [version]'2.2.5') {
              Write-Host "Installing PowerShellGet 2.x..."
              Install-Module -Name PowerShellGet -MinimumVersion 2.2.5 -Force -Scope CurrentUser -AllowClobber
          }

          # Import the fresh version (suppress the old built-in one)
          Import-Module PowerShellGet -MinimumVersion 2.2.5 -Force
          Write-Host "PowerShellGet version: $((Get-Module PowerShellGet).Version)"

      # -----------------------------------------------------------------------
      # STEP 3: Detect which module directories have changed in this push
      # Compares HEAD to HEAD~1. Extracts the top-level module folder name.
      # -----------------------------------------------------------------------
      - name: Detect changed modules
        id: detect
        shell: pwsh
        run: |
          # Get all files changed between this commit and the previous one
          $changedFiles = git diff --name-only HEAD~1 HEAD

          Write-Host "Changed files:"
          $changedFiles | ForEach-Object { Write-Host "  $_" }

          # Extract unique module directory names from paths like: modules/MyNetworkTools/...
          $changedModules = $changedFiles |
              Where-Object { $_ -match '^modules/([^/]+)/' } |
              ForEach-Object { $Matches[1] } |
              Sort-Object -Unique

          if ($changedModules.Count -eq 0) {
              Write-Host "No module directories changed. Nothing to publish."
              echo "modules=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              $moduleList = $changedModules -join ','
              Write-Host "Changed modules: $moduleList"
              echo "modules=$moduleList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      # -----------------------------------------------------------------------
      # STEP 4: Validate and publish each changed module
      # Skips if the version already exists in PowerShell Gallery.
      # -----------------------------------------------------------------------
      - name: Publish changed modules
        if: steps.detect.outputs.modules != ''
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          # Re-import fresh PowerShellGet (runner may have reset module state)
          Import-Module PowerShellGet -MinimumVersion 2.2.5 -Force

          # Split the comma-separated module list from the previous step
          $moduleNames = '${{ steps.detect.outputs.modules }}' -split ','

          $publishedCount = 0
          $skippedCount   = 0
          $failedCount    = 0
          $failedModules  = @()

          foreach ($moduleName in $moduleNames) {
              $modulePath = "modules/$moduleName"
              $manifestPath = "$modulePath/$moduleName.psd1"

              Write-Host ""
              Write-Host "========================================"
              Write-Host "Processing: $moduleName"
              Write-Host "========================================"

              # --- Guard: manifest must exist ---
              if (-not (Test-Path $manifestPath)) {
                  Write-Warning "No manifest found at $manifestPath — skipping."
                  $skippedCount++
                  continue
              }

              # --- Validate the manifest is well-formed ---
              try {
                  $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop
                  $localVersion = $manifest.Version
                  Write-Host "Local version:  $localVersion"
              }
              catch {
                  Write-Error "Manifest validation FAILED for $moduleName`: $_"
                  $failedCount++
                  $failedModules += $moduleName
                  continue
              }

              # --- Check if this version already exists in Gallery (skip if so) ---
              try {
                  $galleryModule = Find-Module -Name $moduleName -RequiredVersion $localVersion `
                                              -Repository PSGallery -ErrorAction SilentlyContinue
                  if ($galleryModule) {
                      Write-Host "Version $localVersion already exists in PSGallery — skipping."
                      $skippedCount++
                      continue
                  }
              }
              catch {
                  # Find-Module throws if module doesn't exist at all — that's fine, means first publish
                  Write-Host "Module not found in Gallery (first publish or version not found) — proceeding."
              }

              # --- Publish with retry logic (3 attempts, 15s back-off) ---
              $maxAttempts = 3
              $attempt     = 0
              $published   = $false

              while ($attempt -lt $maxAttempts -and -not $published) {
                  $attempt++
                  Write-Host "Publish attempt $attempt of $maxAttempts..."

                  try {
                      Publish-Module -Path $modulePath `
                                     -NuGetApiKey $env:PSGALLERY_API_KEY `
                                     -Repository PSGallery `
                                     -Force `
                                     -ErrorAction Stop

                      Write-Host "✅ Successfully published $moduleName v$localVersion"
                      $published = $true
                      $publishedCount++
                  }
                  catch {
                      Write-Warning "Attempt $attempt failed: $_"
                      if ($attempt -lt $maxAttempts) {
                          Write-Host "Waiting 15 seconds before retry..."
                          Start-Sleep -Seconds 15
                      }
                  }
              }

              if (-not $published) {
                  Write-Error "❌ Failed to publish $moduleName after $maxAttempts attempts."
                  $failedCount++
                  $failedModules += $moduleName
              }
          }

          # --- Summary ---
          Write-Host ""
          Write-Host "========================================"
          Write-Host "PUBLISH SUMMARY"
          Write-Host "========================================"
          Write-Host "Published : $publishedCount"
          Write-Host "Skipped   : $skippedCount"
          Write-Host "Failed    : $failedCount"

          if ($failedModules.Count -gt 0) {
              Write-Host "Failed modules: $($failedModules -join ', ')"
          }

          # Fail the workflow step if any module failed to publish
          if ($failedCount -gt 0) {
              exit 1
          }